name: Build and Release JAR

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Best practice: prevents runaway jobs from consuming background resources
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # Best practice: -B (batch mode) and -ntp (no transfer progress) keep CI logs clean and readable
        run: mvn -B -ntp clean package -DskipTests

      - name: Create Release and Upload JAR
        uses: softprops/action-gh-release@v2
        with:
          files: target/*.jar
          generate_release_notes: true # Best practice: automatically generates a changelog based on PRs/commits